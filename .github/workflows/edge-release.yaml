name: Release Edge MCP tooling

on:
  push:
    branches:
      - main

jobs:
  build-edge:
    name: Build Edge MCP binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Build Release
        uses: zijiren233/cargo-cross@v1
        with:
          command: build
          targets: |
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            x86_64-pc-windows-gnu
            aarch64-apple-darwin
            x86_64-apple-darwin
            x86_64h-apple-darwin
            arm64e-apple-darwin
          profile: release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-${{ matrix.target }}
          path: edge-${{ matrix.target }}*

  publish-edge:
    name: Publish to GitHub Releases
    needs: build-edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
      
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Edge Trade ${{ github.ref_name }}" \
            --generate-notes \
            release/*
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p edge-trade

  publish-npm:
    name: Publish to npm
    needs: publish-edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Make Node Happy
        run: corepack enable
      
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: yarn
          cache-dependency-path: yarn.lock
          registry-url: 'https://registry.npmjs.org'
      
      - name: Pull Node Cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-cache-${{ runner.os }}-x64-modules-${{ hashFiles('yarn.lock') }}
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Publish to npm
        run: yarn workspace @edgedottrade/mcp npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-openclaw:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Make Node Happy
        run: corepack enable
      
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      
      - name: Publish to ClawHub
        run: |
          npx clawhub@latest login
          npx clawhub@latest publish plugins/openclaw --name edge --version ${{ github.ref_name }}
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

  publish-claude:
    name: Publish to Claude
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Create marketplace.json
        run: |
          cat > marketplace.json << 'EOF'
          {
            "plugins": [
              {
                "name": "edge",
                "source": "./plugins/claude",
                "version": "${{ github.ref_name }}"
              }
            ]
          }
          EOF
      
      - name: Commit marketplace.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketplace.json
          git commit -m "chore: update marketplace for ${{ github.ref_name }}" || echo "No marketplace changes"
          git push origin main || true
