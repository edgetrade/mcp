name: Release Edge

on:
  push:
    branches:
      - main

jobs:
  tagger:
    name: Find Tag
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Node
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true
      
      - name: Find Tag
        id: finder
        run: |
          echo "tag=$(git describe --abbrev=0 --tags)" >> "$GITHUB_OUTPUT"

    outputs:
      tag: ${{ steps.finder.outputs.tag }}

  build-edge:
    needs: tagger
    name: Build Edge for ${{ matrix.build.target }} on ${{ matrix.build.os }}
    environment: distribution

    strategy:
      matrix:
        build:
          # linux builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          # macos builds
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          # windows builds
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout Node
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true
      
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SYNC_APP_CLIENT_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: edgetrade
          repositories: brain

      - name: Checkout Rust
        uses: actions/checkout@v6
        with:
          repository: edgetrade/brain
          token: ${{ steps.app-token.outputs.token }}
          path: brain
          ref: ${{ needs.tagger.outputs.tag }}
          sparse-checkout: |
            Cargo.toml
            Cargo.lock
            pkg/chaos
            pkg/erato
            pkg/poseidon
            pkg/zeus
          sparse-checkout-cone-mode: false

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Retrieve Rust Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.build.target }}
          override: true
          cache: true
          cache-workspace-crates: true

      - name: Setup Rust
        run: |
          perl -i -0pe 's/^members = \[.*?\]/members = [\n  "pkg\/erato",\n  "pkg\/poseidon",\n]/ms' brain/Cargo.toml

      - name: Configure host compiler for cross-compilation
        if: matrix.build.target == 'aarch64-unknown-linux-musl'
        run: echo "HOST_CC=gcc" >> $GITHUB_ENV

      - name: Build Release
        uses: zijiren233/cargo-cross@v1
        with:
          targets: ${{ matrix.build.target }}
          working-directory: brain
          rustflags: "--cfg tokio_unstable"
          crt-static: true
          command: build
          profile: release
          bin: edge

      - name: Prepare linux binaries for upload
        if: matrix.build.os == 'ubuntu-latest'
        working-directory: brain
        run: |
          if [ -f target/${{ matrix.build.target }}/release/edge ]; then
            rsync --archive --mkpath target/${{ matrix.build.target }}/release/edge dist/edge-${{ needs.tagger.outputs.tag }}-${{ matrix.build.target }}
          elif [ -f target/${{ matrix.build.target }}/release/edge.exe ]; then
            rsync --archive --mkpath target/${{ matrix.build.target }}/release/edge.exe dist/edge-${{ needs.tagger.outputs.tag }}-${{ matrix.build.target }}.exe
          fi

      - name: Prepare macos binaries for upload
        if: matrix.build.os == 'macos-latest'
        working-directory: brain
        run: |
          mkdir -p dist
          cp target/${{ matrix.build.target }}/release/edge dist/edge-${{ needs.tagger.outputs.tag }}-${{ matrix.build.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.target }}
          path: brain/dist/*

  publish-github:
    needs: [build-edge, tagger]
    name: Publish to GitHub
    runs-on: ubuntu-latest
    environment: distribution

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: Prepare release binaries
        run: |
          rsync --archive --verbose --mkpath \
            --include='edge-*' \
            --exclude='*' \
            artifacts/ release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{needs.tagger.outputs.tag}}" \
            --title "Edge ${{needs.tagger.outputs.tag}}" \
            --generate-notes \
            release/*

  publish-npm:
    needs: [publish-github, tagger]
    name: Publish to NPM
    runs-on: ubuntu-latest
    environment: distribution

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true
          
      - name: Make Node Happy
        run: corepack enable
      
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: | 
          # See https://github.com/actions/setup-node/issues/1440
          # unset NODE_AUTH_TOKEN
          npm --version
          npm version "${{needs.tagger.outputs.tag}}" --no-git-tag-version
          npm publish

  publish-openclaw:
    needs: [publish-npm, tagger]
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    environment: distribution

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true
          
      - name: Make Node Happy
        run: corepack enable
      
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Publish to ClawHub
        run: |
          npx clawhub@latest login --token ${{ secrets.CLAWHUB_TOKEN }} --no-browser
          npx clawhub@latest publish plugins/openclaw --slug=edge --name=Edge.Trade --version=${{needs.tagger.outputs.tag}}
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

  publish-claude:
    needs: publish-npm
    name: Publish to Claude
    runs-on: ubuntu-latest
    environment: distribution

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          
      - name: Create marketplace.json
        run: |
          cat > marketplace.json << 'EOF'
          {
            "plugins": [
              {
                "name": "edge",
                "source": "./plugins/claude",
                "version": "${{ github.ref_name }}"
              }
            ]
          }
          EOF
      
      - name: Commit marketplace.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketplace.json
          git commit -m "chore: update marketplace for ${{ github.ref_name }}" || echo "No marketplace changes"
          git push origin main || true
