[package]
name = "edge-trade"
version = "0.1.0"
edition = "2024"
authors = ["Edge Dot Trade <engineering@edge.trade>"]

[[bin]]
name = "edge"
path = "src/main.rs"

[dependencies]
axum = "0.8.8"
redis = { version = "1.0.4", features = ["tokio-comp"] }
base64 = "0.22.1"
chrono = "0.4.44"
clap = { version = "4.5.60", features = ["derive", "env"] }
futures = "0.3.32"
hmac = "0.12.1"
reqwest = { version = "0.13.2", features = ["json", "stream"] }
rmcp = { version = "1.1.0", features = [
  "server",
  "macros",
  "transport-io",
  "transport-streamable-http-server",
] }
schemars = "1.2.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["full"] }
tokio-util = "0.7.18"
url = "2.5.8"
tower = "0.5.3"
html-escape = "0.2.13"
